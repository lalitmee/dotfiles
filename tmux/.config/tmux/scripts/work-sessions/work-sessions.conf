# =============================================================================
# WORK-SESSIONS.CONF - Preset Configuration for Multi-Session Launcher
# =============================================================================
# Define your presets using PARENT directories. When a preset is opened,
# an fzf picker will appear to select repos from that directory.
#
# Format:
#   PRESET_<NUM>_NAME="Display Name"
#   PRESET_<NUM>_PATHS="
#   ~/path/to/parent/directory
#   ~/another/parent/directory
#   "
#
# Notes:
#   - Preset numbers must be 1-9
#   - Lines starting with # are comments (ignored)
#   - Empty lines are ignored
#   - ~ is automatically expanded to $HOME
#   - Multiple paths per preset are supported

# =============================================================================
# PRESET 1: Work Github
# =============================================================================
PRESET_1_NAME="Work Github"
PRESET_1_PATHS="
~/Projects/Work/Github/
"

# =============================================================================
# PRESET 2: Personal Github
# =============================================================================
PRESET_2_NAME="Personal Github"
PRESET_2_PATHS="
~/Projects/Personal/Github/
"

# =============================================================================
# PRESET 3: All Projects (Combined)
# =============================================================================
PRESET_3_NAME="All Projects"
PRESET_3_PATHS="
~/Projects/Work/Github/
~/Projects/Personal/Github/
"

