#!/usr/bin/env zsh

# Directories (relative to git root) to search for .md files
AI_DOCS_FOLDERS=(
	"docs"
	"plans"
	"specs"
	"docs/adr"
)

# Window name prefixes based on the parent directory name of the file
# Format: "parent-dir-name:prefix"
AI_DOCS_PREFIXES=(
	"docs:doc"
	"plans:plan"
	"specs:spec"
)
